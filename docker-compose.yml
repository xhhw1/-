services:
  api:
    build: .
    env_file:
      - .env
    environment:
      APP_ENV: production
      AUTH_ENABLED: "true"
      ADMIN_EMAIL: ${ADMIN_EMAIL:-1173817292@qq.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?Set ADMIN_PASSWORD in .env before starting docker compose}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?Set JWT_SECRET_KEY in .env before starting docker compose}
      PROJECT_STORE_BACKEND: postgres
      GRAPH_CHECKPOINT_BACKEND: postgres
      LANGGRAPH_STRICT_MSGPACK: "true"
      TASK_QUEUE_BACKEND: thread
      BACKGROUND_WORKER_CONCURRENCY: ${BACKGROUND_WORKER_CONCURRENCY:-4}
      DATABASE_URL: postgresql+psycopg://vision_agent:vision_agent@postgres:5432/vision_agent
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      STORAGE_BACKEND: s3
      S3_ENDPOINT_URL: http://minio:9000
      S3_BUCKET: ${S3_BUCKET:-vision-agent}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
      - qdrant
      - minio
    volumes:
      - ./data:/app/data

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vision_agent
      POSTGRES_PASSWORD: vision_agent
      POSTGRES_DB: vision_agent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  qdrant_data:
  minio_data:
