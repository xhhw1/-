services:
  api:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: production
      AUTH_ENABLED: "true"
      ADMIN_EMAIL: ${ADMIN_EMAIL:-1173817292@qq.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?Set ADMIN_PASSWORD in .env before starting docker compose}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?Set JWT_SECRET_KEY in .env before starting docker compose}
      PROJECT_STORE_BACKEND: postgres
      GRAPH_CHECKPOINT_BACKEND: postgres
      LANGGRAPH_STRICT_MSGPACK: "true"
      TASK_QUEUE_BACKEND: ${TASK_QUEUE_BACKEND:-redis}
      TASK_QUEUE_REDIS_QUEUE_NAME: ${TASK_QUEUE_REDIS_QUEUE_NAME:-ai_visual_agent:jobs}
      WORKER_HEARTBEAT_KEY_PREFIX: ${WORKER_HEARTBEAT_KEY_PREFIX:-ai_visual_agent:workers}
      WORKER_HEARTBEAT_TTL_SECONDS: ${WORKER_HEARTBEAT_TTL_SECONDS:-30}
      BACKGROUND_WORKER_CONCURRENCY: ${BACKGROUND_WORKER_CONCURRENCY:-4}
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-true}
      RATE_LIMIT_BACKEND: ${RATE_LIMIT_BACKEND:-redis}
      RATE_LIMIT_DEFAULT_PER_MINUTE: ${RATE_LIMIT_DEFAULT_PER_MINUTE:-120}
      RATE_LIMIT_AGENT_PER_MINUTE: ${RATE_LIMIT_AGENT_PER_MINUTE:-30}
      RATE_LIMIT_UPLOAD_PER_MINUTE: ${RATE_LIMIT_UPLOAD_PER_MINUTE:-60}
      RATE_LIMIT_IMAGE_GENERATION_PER_MINUTE: ${RATE_LIMIT_IMAGE_GENERATION_PER_MINUTE:-6}
      RATE_LIMIT_IMAGE_GENERATION_GLOBAL_PER_MINUTE: ${RATE_LIMIT_IMAGE_GENERATION_GLOBAL_PER_MINUTE:-20}
      IMAGE_GENERATION_MAX_CONCURRENT: ${IMAGE_GENERATION_MAX_CONCURRENT:-1}
      IMAGE_GENERATION_ACQUIRE_TIMEOUT_SECONDS: ${IMAGE_GENERATION_ACQUIRE_TIMEOUT_SECONDS:-20}
      DATABASE_URL: postgresql+psycopg://vision_agent:vision_agent@postgres:5432/vision_agent
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      STORAGE_BACKEND: s3
      S3_ENDPOINT_URL: http://minio:9000
      S3_BUCKET: ${S3_BUCKET:-vision-agent}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      minio:
        condition: service_healthy
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)"]
      interval: 20s
      timeout: 8s
      retries: 5
      start_period: 30s

  worker:
    build: .
    restart: unless-stopped
    command: ["python", "-m", "ai_visual_agent.worker"]
    env_file:
      - .env
    environment:
      APP_ENV: production
      AUTH_ENABLED: "true"
      ADMIN_EMAIL: ${ADMIN_EMAIL:-1173817292@qq.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?Set ADMIN_PASSWORD in .env before starting docker compose}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?Set JWT_SECRET_KEY in .env before starting docker compose}
      PROJECT_STORE_BACKEND: postgres
      GRAPH_CHECKPOINT_BACKEND: postgres
      LANGGRAPH_STRICT_MSGPACK: "true"
      TASK_QUEUE_BACKEND: ${TASK_QUEUE_BACKEND:-redis}
      TASK_QUEUE_REDIS_QUEUE_NAME: ${TASK_QUEUE_REDIS_QUEUE_NAME:-ai_visual_agent:jobs}
      WORKER_HEARTBEAT_KEY_PREFIX: ${WORKER_HEARTBEAT_KEY_PREFIX:-ai_visual_agent:workers}
      WORKER_HEARTBEAT_TTL_SECONDS: ${WORKER_HEARTBEAT_TTL_SECONDS:-30}
      BACKGROUND_WORKER_CONCURRENCY: ${BACKGROUND_WORKER_CONCURRENCY:-4}
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-true}
      RATE_LIMIT_BACKEND: ${RATE_LIMIT_BACKEND:-redis}
      RATE_LIMIT_DEFAULT_PER_MINUTE: ${RATE_LIMIT_DEFAULT_PER_MINUTE:-120}
      RATE_LIMIT_AGENT_PER_MINUTE: ${RATE_LIMIT_AGENT_PER_MINUTE:-30}
      RATE_LIMIT_UPLOAD_PER_MINUTE: ${RATE_LIMIT_UPLOAD_PER_MINUTE:-60}
      RATE_LIMIT_IMAGE_GENERATION_PER_MINUTE: ${RATE_LIMIT_IMAGE_GENERATION_PER_MINUTE:-6}
      RATE_LIMIT_IMAGE_GENERATION_GLOBAL_PER_MINUTE: ${RATE_LIMIT_IMAGE_GENERATION_GLOBAL_PER_MINUTE:-20}
      IMAGE_GENERATION_MAX_CONCURRENT: ${IMAGE_GENERATION_MAX_CONCURRENT:-1}
      IMAGE_GENERATION_ACQUIRE_TIMEOUT_SECONDS: ${IMAGE_GENERATION_ACQUIRE_TIMEOUT_SECONDS:-20}
      DATABASE_URL: postgresql+psycopg://vision_agent:vision_agent@postgres:5432/vision_agent
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      STORAGE_BACKEND: s3
      S3_ENDPOINT_URL: http://minio:9000
      S3_BUCKET: ${S3_BUCKET:-vision-agent}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      minio:
        condition: service_healthy
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python", "-m", "ai_visual_agent.worker_healthcheck"]
      interval: 20s
      timeout: 8s
      retries: 5
      start_period: 30s

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: vision_agent
      POSTGRES_PASSWORD: vision_agent
      POSTGRES_DB: vision_agent
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vision_agent -d vision_agent"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  qdrant_data:
  minio_data:
